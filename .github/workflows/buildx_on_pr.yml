name: PR

on:
  pull_request:

env:
  IMAGE_NAME: ghcr.io/by275/libtorrent
  LT_VER: "1.2.20"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      alpine: ${{ steps.alpine.outputs.changes }}
      ubuntu: ${{ steps.ubuntu.outputs.changes }}
    steps:
    - uses: dorny/paths-filter@v4
      id: alpine
      with:
        filters: |
          alpine3.21: '{.github,alpine3.21}/**'
          alpine3.22: '{.github,alpine3.22}/**'
          alpine3.23: '{.github,alpine3.23}/**'
    - uses: dorny/paths-filter@v4
      id: ubuntu
      with:
        filters: |
          ubuntu22.04: '{.github,ubuntu22.04}/**'
          ubuntu24.04: '{.github,ubuntu24.04}/**'
          ubuntu26.04: '{.github,ubuntu26.04}/**'

  alpine:
    needs:
      - changes
    if: ${{ needs.changes.outputs.alpine != '[]' && needs.changes.outputs.alpine != '' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        distro: ${{ fromJSON(needs.changes.outputs.alpine) }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Cross Build and Load Artifacts
        run: |
          cd ${{ matrix.distro }}
          docker build --build-arg LT_VER=${{ env.LT_VER }} -t lt-build:local -f cross-build.dockerfile .
          docker run --rm -v ${PWD}/build:/build lt-build:local /bin/sh -c "rm -rf /build/* && mv /lt-build/* /build/"
      -
        name: Buildx and Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.distro }}/.
          file: ${{ matrix.distro }}/Dockerfile
          tags: |
            ${{ env.IMAGE_NAME }}:testing-${{ matrix.distro }}
          platforms: linux/amd64,linux/arm/v7,linux/arm64
          push: true
          build-args: |
            LT_VER=${{ env.LT_VER }}
          provenance: false
      -
        name: Generate Release Assets
        run: |
          bash release.sh testing "${{ matrix.distro }}"
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.distro }}
          path: "release/*.tar.gz"

  ubuntu:
    needs:
      - changes
    if: ${{ needs.changes.outputs.ubuntu != '[]' && needs.changes.outputs.ubuntu != '' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        distro: ${{ fromJSON(needs.changes.outputs.ubuntu) }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Cross Build and Load Artifacts
        run: |
          cd ${{ matrix.distro }}
          docker build --build-arg LT_VER=${{ env.LT_VER }} -t lt-build:local -f cross-build.dockerfile .
          docker run --rm -v ${PWD}/build:/build lt-build:local /bin/bash -c "rm -rf /build/* && mv /lt-build/* /build/"
      -
        name: Buildx and Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.distro }}/.
          file: ${{ matrix.distro }}/Dockerfile
          tags: |
            ${{ env.IMAGE_NAME }}:testing-${{ matrix.distro }}
          platforms: linux/amd64,linux/arm/v7,linux/arm64
          push: true
          build-args: |
            LT_VER=${{ env.LT_VER }}
          provenance: false
      -
        name: Generate Release Assets
        run: |
          bash release.sh testing "${{ matrix.distro }}"
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.distro }}
          path: "release/*.tar.gz"
